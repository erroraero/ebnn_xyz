- name: Send Discord Info (All Changes)
        if: steps.compare.outputs.changed == 'true' && steps.detect.outputs.suspicious == 'false'
        run: |
          IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %I:%M:%S %p IST")

          DIFF=$(cat diff.txt | head -n 20 | sed 's/"/\\"/g')

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"📡 DNS Update Detected\",
              \"description\": \"Non-critical DNS records updated\",
              \"color\": 3447003,
              \"fields\": [
                {\"name\": \"🌐 Domain\", \"value\": \"ebnn.xyz\", \"inline\": true},
                {\"name\": \"ℹ️ Change Type\", \"value\": \"Informational\", \"inline\": true},
                {\"name\": \"📊 Diff (Preview)\", \"value\": \"\`\`\`${DIFF}\`\`\`\", \"inline\": false},
                {\"name\": \"⏱️ Time (IST)\", \"value\": \"${IST_TIME}\", \"inline\": false}
              ],
              \"footer\": {
                \"text\": \"avrxt.git DNS Monitoring System\"
              }
            }]
          }" ${{ secrets.MONITOR_DC_HOOK }}
