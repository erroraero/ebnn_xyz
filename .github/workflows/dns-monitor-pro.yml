name: EBN DNS Monitor PRO

on:
  schedule:
    - cron: "0 0 */7 * *"
  workflow_dispatch:

jobs:
  dns-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install DNS tools
        run: sudo apt-get update && sudo apt-get install -y dnsutils

      - name: Fetch DNS Records
        id: dns
        run: |
          DOMAIN="ebnn.xyz"

          echo "Fetching DNS..."

          {
            echo "A:"
            dig +short A $DOMAIN
            echo "AAAA:"
            dig +short AAAA $DOMAIN
            echo "MX:"
            dig +short MX $DOMAIN
            echo "NS:"
            dig +short NS $DOMAIN
            echo "TXT:"
            dig +short TXT $DOMAIN
          } > current_dns.txt

      - name: Compare DNS
        id: compare
        run: |
          mkdir -p dns_history

          if [ -f dns_history/latest.txt ]; then
            diff dns_history/latest.txt current_dns.txt > diff.txt || true

            if [ -s diff.txt ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            touch diff.txt
          fi

      - name: Detect Suspicious Changes
        id: detect
        run: |
          SUSPICIOUS="false"
          REASON="ℹ️ Non-critical DNS change"

          if grep -q "^NS:" diff.txt; then
            SUSPICIOUS="true"
            REASON="🚨 NS records changed (possible hijack)"
          elif grep -q "^A:" diff.txt; then
            SUSPICIOUS="true"
            REASON="⚠️ A record IP changed"
          fi

          echo "suspicious=$SUSPICIOUS" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT

      - name: Save History
        run: |
          mkdir -p dns_history

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          cp current_dns.txt dns_history/$TIMESTAMP.txt
          cp current_dns.txt dns_history/latest.txt

      - name: Commit History
        run: |
          git config --global user.name "dns-monitor"
          git config --global user.email "bot@avrxt.local"
          git add dns_history
          git commit -m "DNS snapshot update" || echo "No changes"
          git push

      - name: Send Discord Alert (Critical Only)
        if: steps.compare.outputs.changed == 'true' && steps.detect.outputs.suspicious == 'true'
        run: |
          IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %I:%M:%S %p IST")

          DIFF=$(cat diff.txt | head -n 20 | sed 's/"/\\"/g')

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"🚨 Critical DNS Change Detected\",
              \"description\": \"${{ steps.detect.outputs.reason }}\",
              \"color\": 15158332,
              \"fields\": [
                {\"name\": \"🌐 Domain\", \"value\": \"ebnn.xyz\", \"inline\": true},
                {\"name\": \"⚠️ Change Type\", \"value\": \"Critical\", \"inline\": true},
                {\"name\": \"📊 Diff (Preview)\", \"value\": \"\`\`\`${DIFF}\`\`\`\", \"inline\": false},
                {\"name\": \"⏱️ Time (IST)\", \"value\": \"${IST_TIME}\", \"inline\": false}
              ],
              \"footer\": {
                \"text\": \"avrxt.git DNS Monitoring System\"
              }
            }]
          }" ${{ secrets.MONITOR_DC_HOOK }}
