name: avrxt Pipeline Alerts

on:
  push:
  release:
    types: [published]

jobs:
  notify-start:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send START alert
        run: |
          IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %I:%M:%S %p IST")

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"🟡 Build Started\",
              \"color\": 16776960,
              \"fields\": [
                {\"name\": \"📁 Repo\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                {\"name\": \"🌿 Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                {\"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                {\"name\": \"🔗 Commit\", \"value\": \"[View Commit](${{ github.event.head_commit.url }})\", \"inline\": false},
                {\"name\": \"⏱️ Time (IST)\", \"value\": \"${IST_TIME}\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"avrxt.git Monitoring System\"}
            }]
          }" ${{ secrets.DISCORD_WEBHOOK }}

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - uses: actions/checkout@v4

      - name: Simulate Build
        run: |
          echo "Run your real build here"
          sleep 5

  notify-success:
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Send SUCCESS alert
        run: |
          IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %I:%M:%S %p IST")

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"🟢 Build Success\",
              \"color\": 5763719,
              \"fields\": [
                {\"name\": \"📁 Repo\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                {\"name\": \"🌿 Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                {\"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                {\"name\": \"📝 Commit\", \"value\": \"${{ github.event.head_commit.message }}\", \"inline\": false},
                {\"name\": \"🔗 Commit\", \"value\": \"[View Commit](${{ github.event.head_commit.url }})\", \"inline\": false},
                {\"name\": \"⏱️ Time (IST)\", \"value\": \"${IST_TIME}\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"avrxt.git Monitoring System\"}
            }]
          }" ${{ secrets.DISCORD_WEBHOOK }}

  notify-failure:
    if: failure() && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Send FAILURE alert
        run: |
          IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %I:%M:%S %p IST")

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"🔴 Build Failed\",
              \"color\": 15548997,
              \"fields\": [
                {\"name\": \"📁 Repo\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                {\"name\": \"🌿 Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                {\"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                {\"name\": \"📝 Commit\", \"value\": \"${{ github.event.head_commit.message }}\", \"inline\": false},
                {\"name\": \"🔗 Commit\", \"value\": \"[View Commit](${{ github.event.head_commit.url }})\", \"inline\": false},
                {\"name\": \"⚠️ Action\", \"value\": \"Check GitHub Actions logs\", \"inline\": false},
                {\"name\": \"⏱️ Time (IST)\", \"value\": \"${IST_TIME}\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"avrxt.git Monitoring System\"}
            }]
          }" ${{ secrets.DISCORD_WEBHOOK }}

  notify-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Detect version type
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" =~ ^v?[0-9]+\.[0-9]+\.0$ ]]; then
            echo "type=🟡 Minor Update" >> $GITHUB_OUTPUT
          elif [[ "$TAG" =~ ^v?[0-9]+\.0\.0$ ]]; then
            echo "type=🔵 Major Release" >> $GITHUB_OUTPUT
          else
            echo "type=🟢 Patch Update" >> $GITHUB_OUTPUT
          fi

      - name: Send RELEASE alert
        run: |
          IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %I:%M:%S %p IST")

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"📦 New Release • ${{ steps.version.outputs.type }}\",
              \"color\": 3447003,
              \"fields\": [
                {\"name\": \"🏷️ Version\", \"value\": \"${{ github.event.release.tag_name }}\", \"inline\": true},
                {\"name\": \"📁 Repo\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                {\"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},

                {\"name\": \"📜 Changelog\", \"value\": \"${{ github.event.release.body }}\", \"inline\": false},

                {\"name\": \"🔗 Release\", \"value\": \"[View Release](${{ github.event.release.html_url }})\", \"inline\": true},
                {\"name\": \"⬇️ Download\", \"value\": \"[Download ZIP](${{ github.event.release.zipball_url }})\", \"inline\": true},

                {\"name\": \"⏱️ Time (IST)\", \"value\": \"${IST_TIME}\", \"inline\": false}
              ],
              \"footer\": {
                \"text\": \"avrxt.git Monitoring System\"
              }
            }]
          }" ${{ secrets.DISCORD_WEBHOOK }}
